<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulář</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-pattern"></div>
<div class="web-container">
    <section class="panel-card">
        <h2>Formulář</h2>
        <div class="decorative-line">✦</div>
        
        <form action="#" method="POST" onsubmit="alert('Odesláno panu Topolovskému!'); return false;" class="profi-form">
            <div class="input-wrap">
                <label>Jméno a příjmení</label>
                <input type="text" placeholder="Zadejte své jméno a příjmení" required>
            </div>
            
            <div class="radio-wrap">
                <label class="section-lbl">Jste</label>
                <label class="radio-lbl"><input type="radio" name="jste" required> a) Chudá blecha</label>
                <label class="radio-lbl"><input type="radio" name="jste"> b) Bohatá bílá huba</label>
            </div>

            <div class="radio-wrap">
                <label class="section-lbl">Chcete být</label>
                <label class="radio-lbl"><input type="radio" name="chcete" required> a) Chudá blecha</label>
                <label class="radio-lbl"><input type="radio" name="chcete"> b) Bohatá bílá huba</label>
            </div>
            
            <button type="submit" class="black-btn">ODESLAT</button>
            
            <p class="form-note">➔ Těším se na Vás! ☺</p>
        </form>
    </section>
    <a href="index.html" class="back-btn">← Zpět</a>
</div>
</body>
</html>
