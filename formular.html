<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Formulář</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="web-container" style="text-align:center;">
    <section class="panel-card">
        <h2>Formulář</h2>
        <form class="profi-form" onsubmit="alert('Odesláno!'); return false;">
            <div class="input-wrap">
                <label>Jméno a příjmení</label>
                <input type="text" placeholder="Zadejte své jméno" required>
            </div>
            <div class="input-wrap">
                <label>Jste</label>
                <label class="radio-lbl"><input type="radio" name="jste" required> a) Chudá blecha</label>
                <label class="radio-lbl"><input type="radio" name="jste"> b) Bohatá bílá huba</label>
            </div>
            <button type="submit" class="black-btn">ODESLAT</button>
        </form>
    </section>
    <a href="index.html" class="back-btn">← Zpět</a>
</div>
</body>
</html>
