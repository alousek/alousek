<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kde poradím - Bc. Aleš Topolovský</title>
    <link href="https://fonts.googleapis.com/css2 family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <h2>Kde poradím</h2>
    </div>
</header>

<main>
    <div class="map-container">
        <p style="margin-bottom: 1.5rem; color: #c9d1d9; text-align: center;">Působím v celém Středočeském kraji s hlavním zázemím v Praze.</p>
        
        <div class="map-svg-wrap">
            <!-- Vektorová stylizovaná mapa Středočeského kraje s Prahou uprostřed -->
            <svg viewBox="0 0 400 300" style="width: 100%; height: auto;">
                <!-- Středočeský kraj -->
                <path d="M50,80 L120,40 L220,30 L320,60 L360,130 L340,220 L270,270 L160,260 L70,220 L40,140 Z" fill="#1f2937" stroke="#4b5563" stroke-width="3" />
                <!-- Praha uprostřed -->
                <path d="M170,120 Q200,100 220,130 Q210,160 180,150 Q160,140 170,120 Z" fill="#374151" stroke="#58a6ff" stroke-width="2" stroke-dasharray="4" />
                <text x="175" y="110" fill="#58a6ff" font-size="12" font-family="sans-serif" font-weight="bold">PRAHA</text>
                
                <!-- Červený špendlík na pozici Prahy -->
                <g transform="translate(195, 130)">
                    <path d="M0,0 C-5,-10 -10,-15 -10,-22 C-10,-28 -5,-32 0,-32 C5,-32 10,-28 10,-22 C10,-15 5,-10 0,0 Z" fill="#ff3838" />
                    <circle cx="0" cy="-22" r="4" fill="#ffffff" />
                </g>
            </svg>
        </div>
    </div>
    <a href="index.html" class="back-btn">← Zpět na hlavní stránku</a>
</main>

<footer>
    © 2026 Bc. Aleš Topolovský
</footer>

</body>
</html>
